<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - Food Store</title>
  <link rel="stylesheet" href="/src/css/style.css">
</head>

<body class="auth-body">

  <header>
    <h1>🍔 Food Store</h1>
  </header>

  <main class="auth-container">
    <div class="auth-card">
      <h2>Crear cuenta</h2>

      <form id="registro-form">

        <div class="form-group">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" placeholder="Tu nombre" required />
        </div>

        <div class="form-group">
          <label for="apellido">Apellido</label>
          <input type="text" id="apellido" placeholder="Tu apellido" required />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="tucorreo@mail.com" required />
        </div>

        <div class="form-group">
          <label for="celular">Celular</label>
          <input type="text" id="celular" placeholder="Tu número de celular" />
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="Mínimo 6 caracteres" required />
        </div>

        <p id="error-msg" class="error-msg" style="display: none;"></p>

        <button type="submit" class="btn-primary">Registrarse</button>

      </form>

      <p>¿Ya tenés cuenta? <a href="/src/pages/auth/login/login.html">Iniciá sesión</a></p>

    </div>
  </main>

  <script type="module" src="./registro.ts"></script>

</body>

</html>
