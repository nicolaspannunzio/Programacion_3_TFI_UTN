<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mis Pedidos - Food Store</title>
  <link rel="stylesheet" href="/src/css/style.css" />
</head>
<body>

  <header class="store-header">
    <h1>🍔 Food Store</h1>
    <nav>
      <a href="/src/pages/store/home/home.html">← Volver al catálogo</a>
      <button id="logout-btn" class="btn-logout">Salir</button>
    </nav>
  </header>

  <main class="orders-container">
    <h2>Mis Pedidos</h2>

    <div id="orders-list"></div>

    <div id="empty-msg" style="display: none;">
      <p>Todavía no realizaste ningún pedido.</p>
      <a href="/src/pages/store/home/home.html">Ver catálogo</a>
    </div>
  </main>

  <div id="order-modal" style="display: none;">
    <div class="modal-overlay"></div>
    <div class="modal-card">
      <h2>Detalle del Pedido</h2>
      <div id="order-detail-content"></div>
      <button id="btn-close-modal" class="btn-primary">Cerrar</button>
    </div>
  </div>

  <script type="module" src="./orders.ts"></script>
</body>
</html>
