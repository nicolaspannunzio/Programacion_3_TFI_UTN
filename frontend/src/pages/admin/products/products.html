<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Productos - Admin</title>
  <link rel="stylesheet" href="/src/css/style.css" />
</head>
<body>

  <header class="store-header">
    <h1>🍔 Food Store — Admin</h1>
    <button id="logout-btn" class="btn-logout">Salir</button>
  </header>

  <div class="admin-layout">

    <aside class="admin-sidebar">
      <nav>
        <ul>
          <li><a href="../home/home.html">📊 Dashboard</a></li>
          <li><a href="../categories/categories.html">🗂 Categorías</a></li>
          <li><a href="./products.html" class="active">🍔 Productos</a></li>
          <li><a href="../orders/orders.html">📦 Pedidos</a></li>
          <li><a href="/src/pages/store/home/home.html">🛒 Ver Tienda</a></li>
        </ul>
      </nav>
    </aside>

    <main class="admin-main">
      <div class="admin-section-header">
        <h2>Gestión de Productos</h2>
        <button id="btn-nuevo" class="btn-primary">+ Nuevo Producto</button>
      </div>

      <table class="admin-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Precio</th>
            <th>Categoría</th>
            <th>Stock</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="productos-tbody"></tbody>
      </table>

      <div id="empty-msg" style="display:none;">
        <p>No hay productos cargados todavía.</p>
      </div>
    </main>
  </div>

  <!-- Modal crear/editar -->
  <div id="modal" style="display:none;">
    <div class="modal-overlay"></div>
    <div class="modal-card">
      <h2 id="modal-title">Nuevo Producto</h2>
      <form id="producto-form">

        <div class="form-group">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" required />
        </div>

        <div class="form-group">
          <label for="descripcion">Descripción</label>
          <textarea id="descripcion" rows="2"></textarea>
        </div>

        <div class="form-group">
          <label for="precio">Precio</label>
          <input type="number" id="precio" min="0.01" step="0.01" required />
        </div>

        <div class="form-group">
          <label for="stock">Stock</label>
          <input type="number" id="stock" min="0" required />
        </div>

        <div class="form-group">
          <label for="imagen">URL de imagen</label>
          <input type="text" id="imagen" placeholder="https://..." />
        </div>

        <div class="form-group">
          <label for="categoria">Categoría</label>
          <select id="categoria" required></select>
        </div>

        <div class="form-group">
          <label>
            <input type="checkbox" id="disponible" checked />
            Producto disponible
          </label>
        </div>

        <p id="form-error" class="error-msg" style="display:none;"></p>

        <div class="modal-actions">
          <button type="button" id="btn-cancelar" class="btn-secondary">Cancelar</button>
          <button type="submit" class="btn-primary">Guardar</button>
        </div>

      </form>
    </div>
  </div>

  <script type="module" src="./products.ts"></script>
</body>
</html>
